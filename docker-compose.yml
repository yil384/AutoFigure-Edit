services:
  autofigure-edit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-nvidia/cuda:12.1.1-runtime-ubuntu22.04}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
    image: autofigure-edit:latest
    container_name: autofigure-edit
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /app/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY:-}
      ROBOFLOW_API_URL: ${ROBOFLOW_API_URL:-https://serverless.roboflow.com/sam3/concept_segment}
      ROBOFLOW_API_FALLBACK_URLS: ${ROBOFLOW_API_FALLBACK_URLS:-}
      FAL_KEY: ${FAL_KEY:-}
      ESRGAN_MODEL_DIR: /app/.cache/realesrgan
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - hf_cache:/app/.cache/huggingface
      - esrgan_cache:/app/.cache/realesrgan
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  hf_cache:
  esrgan_cache:
